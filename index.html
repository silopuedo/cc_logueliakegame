<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>蛋壳特工队 - Roguelike 生存</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;touch-action:none;font-family:'Segoe UI',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .3s}
.menu-bg{background:radial-gradient(ellipse at center,rgba(26,26,46,.92),rgba(0,0,0,.95))}
.menu-title{font-size:clamp(30px,8vw,56px);color:#f1c40f;text-shadow:0 0 30px rgba(241,196,15,.5),0 0 60px rgba(241,196,15,.2);margin-bottom:6px;letter-spacing:2px;font-weight:900}
.menu-sub{color:#aaa;font-size:clamp(13px,3vw,18px);margin-bottom:10px}
.menu-section-title{color:#f1c40f;font-size:clamp(18px,5vw,28px);font-weight:700;margin-bottom:16px;text-shadow:0 0 15px rgba(241,196,15,.3)}
.menu-desc{color:#888;font-size:clamp(11px,2.2vw,14px);margin-bottom:20px;text-align:center;line-height:1.6;max-width:380px}
.btn{pointer-events:auto;padding:12px 40px;font-size:clamp(14px,3vw,19px);border:none;border-radius:10px;cursor:pointer;font-weight:700;transition:all .15s;font-family:inherit;min-width:160px;text-align:center;margin:5px 0;letter-spacing:.5px}
.btn:active{transform:scale(.93)}
.btn-gold{background:linear-gradient(135deg,#f1c40f,#e67e22);color:#1a1a2e;box-shadow:0 4px 20px rgba(241,196,15,.3)}
.btn-gold:hover{box-shadow:0 6px 30px rgba(241,196,15,.45);transform:translateY(-1px)}
.btn-blue{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;box-shadow:0 4px 18px rgba(52,152,219,.25)}
.btn-blue:hover{box-shadow:0 6px 25px rgba(52,152,219,.4);transform:translateY(-1px)}
.btn-red{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 4px 18px rgba(231,76,60,.25)}
.btn-red:hover{box-shadow:0 6px 25px rgba(231,76,60,.4);transform:translateY(-1px)}
.btn-small{padding:8px 22px;font-size:clamp(12px,2.2vw,15px);min-width:auto}
.btn-back{background:rgba(255,255,255,.08);color:#aaa;border:1px solid rgba(255,255,255,.15);min-width:100px}
.btn-back:hover{background:rgba(255,255,255,.15);color:#fff}
.btn-disabled{opacity:.4;pointer-events:none;cursor:not-allowed}
.row-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px;padding:0 15px}
#pauseBtn{position:fixed;top:12px;right:12px;z-index:200;width:clamp(32px,6vw,40px);height:clamp(32px,6vw,40px);border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;font-size:clamp(14px,3vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);transition:all .15s}
#pauseBtn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
#pauseBtn:active{transform:scale(.9)}
#ui{position:fixed;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);font-size:12px}
.ui-side{display:flex;flex-direction:column;gap:4px}
.ui-side.right{align-items:flex-end}
.ui-box{background:rgba(0,0,0,.5);padding:3px 8px;border-radius:5px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:center;gap:6px}
.hpBarOuter{width:120px;height:10px;background:rgba(0,0,0,.5);border-radius:5px;overflow:hidden;position:relative}
.hpBar{width:100%;height:100%;border-radius:5px;transition:width .12s}.hpBar.red{background:linear-gradient(90deg,#e74c3c,#2ecc71)}.hpBar.blue{background:linear-gradient(90deg,#3498db,#2ecc71)}.hpBar.orange{background:linear-gradient(90deg,#e67e22,#2ecc71)}
.hpText{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.xpBarOuter{width:120px;height:5px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden}
.xpBar{width:0%;height:100%;background:linear-gradient(90deg,#3498db,#9b59b6);border-radius:3px;transition:width .15s}
#p1UI{display:flex;flex-direction:column;gap:4px}
#p2UI{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.role-tag{font-size:10px;color:#f1c40f;font-weight:700}
#coopInfo{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;gap:16px;font-size:11px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
#coopInfo span{background:rgba(0,0,0,.5);padding:3px 8px;border-radius:4px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
#upgradePanel{background:rgba(0,0,0,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);display:none;z-index:50}
#upgradePanel .title{color:#f1c40f;font-size:clamp(18px,4.5vw,26px);font-weight:700;margin-bottom:4px}
#upgradePanel .sub{color:#aaa;font-size:clamp(11px,2.2vw,14px);margin-bottom:14px}
#upgradeChoices{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px;padding:0 12px}
.ucard{pointer-events:auto;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 14px;width:clamp(115px,24vw,155px);cursor:pointer;text-align:center;transition:all .18s;color:#fff}
.ucard:active{border-color:#f1c40f;background:rgba(241,196,15,.15);transform:scale(.95)}
.ucard .icon{font-size:clamp(22px,4.5vw,32px);margin-bottom:4px}
.ucard .name{font-size:clamp(11px,2.4vw,15px);font-weight:700;margin-bottom:2px}
.ucard .desc{font-size:clamp(10px,1.9vw,11px);color:#aaa}
.ucard .val{color:#2ecc71;font-size:clamp(10px,2.2vw,12px);margin-top:3px}
.ucard.coop{border-color:rgba(241,196,15,.3)}
.ucard.coop .val{color:#f1c40f}
#gameOver{background:rgba(0,0,0,.88);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);display:none;z-index:60}
#gameOver h2{color:#e74c3c;font-size:clamp(22px,6vw,38px);margin-bottom:4px}
#gameOver .gsub{color:#aaa;font-size:clamp(12px,2.2vw,16px);margin-bottom:14px}
#gameOver .stats{color:#fff;font-size:clamp(12px,2.5vw,16px);margin-bottom:18px;text-align:center;line-height:2}
#gameOver .stats span{color:#f1c40f}
#waveBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;font-weight:700;color:#f1c40f;text-shadow:0 0 40px rgba(241,196,15,.5);opacity:0;transition:opacity .4s;font-size:clamp(20px,5vw,40px)}
.jArea{position:fixed;display:none;z-index:5;pointer-events:none;border-radius:50%}.jBase{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12)}.jKnob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;height:40%;border-radius:50%;background:rgba(255,255,255,.2);transition:none}
#skillIndicator{position:fixed;bottom:60px;left:10px;z-index:10;pointer-events:none;display:flex;gap:8px;display:none}
#skillIndicator .sk{background:rgba(0,0,0,.6);padding:4px 8px;border-radius:4px;color:#f1c40f;font-size:10px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
#playerTag{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:8;pointer-events:none;font-size:10px;color:rgba(255,255,255,.4)}
@media(max-width:600px){
  .hpBarOuter,.xpBarOuter{width:90px}.hpBarOuter{height:8px}.xpBarOuter{height:4px}
  .ui-box{padding:2px 5px;font-size:10px;gap:3px}
  .btn{min-width:130px;padding:10px 32px}
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="pauseBtn" style="display:none">⏸</div>

<div id="ui" style="display:none">
  <div class="ui-side" id="p1UI"></div>
  <div class="ui-side right">
    <div id="statTime" class="ui-box">00:00</div>
    <div id="statKills" class="ui-box">击杀 0</div>
  </div>
  <div class="ui-side right" id="p2UI" style="display:none"></div>
</div>

<div id="coopInfo" style="display:none"></div>

<div id="skillIndicator"></div>

<div id="playerTag">P1: WASD+E(技能) | P2: 方向键+Enter(技能)</div>

<div id="waveBanner"></div>

<div id="jArea1" class="jArea"></div>
<div id="jArea2" class="jArea"></div>

<div id="startScreen" class="overlay menu-bg">
  <div class="menu-title">蛋壳特工队</div>
  <div class="menu-sub">Roguelike 生存挑战</div>
  <button class="btn btn-gold" id="btnPlay">开始游戏</button>
  <button class="btn btn-blue btn-small" id="btnHow" style="margin-top:10px">游戏说明</button>
</div>

<div id="howScreen" class="overlay menu-bg" style="display:none">
  <div class="menu-section-title">游戏说明</div>
  <div class="menu-desc">⌨ WASD/方向键 移动 | 📱 触摸摇杆<br>🔫 自动攻击附近怪物<br>💎 击杀掉落经验宝石<br>⬆ 升级选择强化<br>⌛ 生存尽可能久！<br><br>双人模式：P1=WASD+E | P2=方向键+Enter</div>
  <button class="btn btn-back" id="btnHowBack">返回</button>
</div>

<div id="modeScreen" class="overlay menu-bg" style="display:none">
  <div class="menu-section-title">选择模式</div>
  <div class="row-btns">
    <button class="btn btn-gold" data-mode="single">单人模式</button>
    <button class="btn btn-blue" data-mode="survival">双人生存</button>
    <button class="btn btn-red" data-mode="cooperative">双人合作</button>
  </div>
  <button class="btn btn-back" id="btnModeBack" style="margin-top:16px">返回</button>
</div>

<div id="roleScreen" class="overlay menu-bg" style="display:none">
  <div class="menu-section-title">选择角色分配</div>
  <div class="menu-desc">WASD 玩家 = 冰之守护者 🧊<br>方向键 玩家 = 烈焰射手 🔥</div>
  <div class="row-btns">
    <button class="btn btn-blue" data-roles="ice,fire">冰守(WASD) + 烈焰(方向键)</button>
    <button class="btn btn-red" data-roles="fire,ice">烈焰(WASD) + 冰守(方向键)</button>
  </div>
  <button class="btn btn-back" id="btnRoleBack" style="margin-top:16px">返回</button>
</div>

<div id="pauseScreen" class="overlay" style="display:none;background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:55">
  <div class="menu-section-title" style="font-size:clamp(22px,5vw,32px)">游戏暂停</div>
  <button class="btn btn-gold" id="btnResume">继续游戏</button>
  <button class="btn btn-blue btn-small" id="btnRestart">重新开始</button>
  <button class="btn btn-back btn-small" id="btnMenu" style="margin-top:6px">返回主菜单</button>
</div>

<div id="upgradePanel" class="overlay">
  <div class="title">⬆ 升级!</div>
  <div class="sub" id="upgradeSub">选择一个强化</div>
  <div id="upgradeChoices"></div>
</div>

<div id="gameOver" class="overlay">
  <h2>游戏结束</h2>
  <div class="gsub" id="goSub">你倒在了战场上...</div>
  <div class="stats" id="goStats"></div>
  <button class="btn btn-gold" id="btnRetry">再来一局</button>
  <button class="btn btn-back btn-small" id="btnGoMenu" style="margin-top:6px">返回主菜单</button>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const CFG={
  player:{r:16,speed:280,hp:100,atkInt:0.55,proj:1,projSpd:600,pierce:0,regen:1,magnet:80},
  enemies:{normal:{r:12,sp:90,hp:30,dmg:8,xp:5,color:'#e74c3c'},fast:{r:10,sp:160,hp:18,dmg:5,xp:7,color:'#e67e22'},tank:{r:20,sp:45,hp:90,dmg:12,xp:12,color:'#9b59b6'},boss:{r:34,sp:55,hp:400,dmg:25,xp:50,color:'#f1c40f'}},
  waves:[{t:0,si:2.0,n:2},{t:30,si:1.6,n:2},{t:60,si:1.3,n:3},{t:120,si:1.0,n:3},{t:180,si:0.85,n:4},{t:240,si:0.7,n:4},{t:300,si:0.55,n:5}],
  // 冰之守护者
  ice:{name:'冰之守护者',color:'#3498db',r:18,spMult:.8,hpMult:2,armorMult:1.5,dmg:12,atkInt:0.65,proj:1,projSpd:500,pierce:0,regen:1.5,magnet:80,
    skill:{name:'冰墙屏障',cd:12,dur:6,key:'e'},passive:{shieldCD:8,shieldPct:.2}},
  // 烈焰射手
  fire:{name:'烈焰射手',color:'#e74c3c',r:14,spMult:1.2,hpMult:.7,armorMult:.5,dmg:22,atkInt:0.45,proj:1,projSpd:700,pierce:1,regen:.5,magnet:80,
    skill:{name:'烈焰爆发',cd:10,dur:.6,key:'enter'},passive:{killSpdBonus:.05,maxStacks:5,dur:3}},
  upgrades:[
    {id:'damage',name:'攻击力',desc:'伤害+8',icon:'⚔',perLv:8},
    {id:'attSpd',name:'攻速',desc:'间隔-0.06s',icon:'⚡',perLv:.06},
    {id:'mSpd',name:'移速',desc:'速度+25',icon:'👟',perLv:25},
    {id:'multi',name:'多重',desc:'子弹+1',icon:'🔫',perLv:1},
    {id:'pierce',name:'穿透',desc:'穿透+1',icon:'💎',perLv:1},
    {id:'pSpd',name:'弹速',desc:'弹速+50',icon:'💨',perLv:50},
    {id:'hpUp',name:'生命',desc:'生命+20',icon:'❤',perLv:20},
    {id:'regen',name:'回复',desc:'回复+1/s',icon:'🩹',perLv:1},
    {id:'magnet',name:'磁铁',desc:'范围+25',icon:'🧲',perLv:25}
  ],
  coopUpgrades:[
    {id:'coopDmg',name:'协力攻击',desc:'双方伤害+6',icon:'⚔',perLv:6},
    {id:'coopHp',name:'协力生命',desc:'双方生命+12',icon:'❤',perLv:12},
    {id:'coopSpd',name:'协力速度',desc:'双方移速+18',icon:'👟',perLv:18},
    {id:'coopRegen',name:'协力回复',desc:'双方回复+0.4/s',icon:'🩹',perLv:.4}
  ]
};

// ============================================================
//  DOM
// ============================================================
const $=id=>document.getElementById(id);
const canvas=$('gameCanvas'),ctx=canvas.getContext('2d');
const pauseBtn=$('pauseBtn'),ui=$('ui'),p1UI=$('p1UI'),p2UI=$('p2UI'),statTime=$('statTime'),statKills=$('statKills');
const coopInfo=$('coopInfo'),skillInd=$('skillIndicator'),playerTag=$('playerTag');
const waveBanner=$('waveBanner'),jA1=$('jArea1'),jA2=$('jArea2');
const startScreen=$('startScreen'),howScreen=$('howScreen'),modeScreen=$('modeScreen'),roleScreen=$('roleScreen');
const pauseScreen=$('pauseScreen'),upgradePanel=$('upgradePanel'),upgradeChoices=$('upgradeChoices'),upgradeSub=$('upgradeSub');
const gameOverScreen=$('gameOver'),goSub=$('goSub'),goStats=$('goStats');
const dl=document;

// ============================================================
//  AUDIO
// ============================================================
let actx=null;
function initA(){if(!actx)actx=new(AudioContext||webkitAudioContext)()}
function sfx(freqs,type,dur,vol){
  try{initA();const now=actx.currentTime;freqs.forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
    o.type=type;o.frequency.setValueAtTime(f,now+i*0.07);
    g.gain.setValueAtTime(vol,now+i*0.07);g.gain.exponentialRampToValueAtTime(.001,now+i*0.07+dur);
    o.start(now+i*0.07);o.stop(now+i*0.07+dur);
  })}catch(e){}
}
const SND={shoot:()=>sfx([600,200],'square',.05,.04),hit:()=>sfx([200],'sine',.06,.06),
  xp:()=>sfx([500,800],'sine',.08,.03),lvlUp:()=>sfx([523,659,784],'sine',.12,.05),
  over:()=>sfx([400,350,300,200],'sawtooth',.15,.04),
  ice:()=>sfx([300,200,150],'sine',.1,.05),fire:()=>sfx([600,800,400],'sawtooth',.08,.05),
  steam:()=>sfx([200,400,600,800],'sine',.12,.04)};

// ============================================================
//  STATE
// ============================================================
let W,H;
let gameState='menu'; // menu|playing|paused|gameover
let gameMode=null;     // single|survival|cooperative
let roles=[];           // ['ice','fire'] or ['fire','ice']
let players=[],enemies=[],projs=[],gems=[],parts=[],floatT=[];
let iceWalls=[];
let gameTime=0,sharedLv=1,sharedXp=0,sharedXpTo=12,kills=0;
let spawnTimer=0,bossSpawned=false;
let lastT=0;
let paused=false;
let upgLvs={},coopUpgLvs={};
let skillIndTimers=[];
let reviveTarget=null,reviveProgress=0;
let waveShown=[];
let upgrading=false; // pause game during upgrade selection

// touch
let touches=[{active:false,id:-1,sx:0,sy:0,dx:0,dy:0},{active:false,id:-1,sx:0,sy:0,dx:0,dy:0}];
let jAreas=[jA1,jA2];

// ============================================================
//  MATH
// ============================================================
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function ang(a,b){return Math.atan2(b.y-a.y,b.x-a.x)}
function rand(mn,mx){return Math.random()*(mx-mn)+mn}
function randInt(mn,mx){return Math.floor(rand(mn,mx+1))}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function lerp(a,b,t){return a+(b-a)*t}

// ============================================================
//  RESIZE
// ============================================================
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,300));

// ============================================================
//  CREATE PLAYER
// ============================================================
function createPlayer(cfg,x,y,role){
  const base=CFG.player;
  const p={
    x,y,r:cfg.r||base.r,speed:cfg.speed||base.speed,
    hp:cfg.hp||base.hp,maxHp:cfg.maxHp||base.hp,
    dmg:cfg.dmg||15,atkInt:cfg.atkInt||base.atkInt,cd:0,
    proj:cfg.proj||1,projSpd:cfg.projSpd||base.projSpd,
    pierce:cfg.pierce||0,regen:cfg.regen||1,magnet:cfg.magnet||80,
    inv:0,role:role||null,armor:cfg.armor||1,
    skillCD:0,skillMaxCD:cfg.skillCD||0,skillDur:0,skillKey:cfg.skillKey||'',
    passiveTimer:0,passiveStacks:0,shield:0,shieldMax:0,
    shieldCDTimer:0,downed:false
  };
  // apply multipliers
  if(cfg.spMult){p.speed*=cfg.spMult;p.speed=Math.round(p.speed);}
  if(cfg.hpMult){p.maxHp*=cfg.hpMult;p.hp=p.maxHp;p.maxHp=Math.round(p.maxHp);p.hp=Math.round(p.hp);}
  if(cfg.armorMult)p.armor=cfg.armorMult;
  if(cfg.skillCD)p.skillMaxCD=cfg.skillCD;
  if(cfg.passive&&cfg.passive.shieldCD)p.shieldCDTimer=cfg.passive.shieldCD;
  return p;
}

function initSingle(){
  players=[createPlayer({r:16,speed:280,hp:100,dmg:15,atkInt:.55,proj:1,projSpd:600,pierce:0,regen:1,magnet:80,armor:1},W/2,H/2,null)];
  upgLvs={};coopUpgLvs={};
  CFG.upgrades.forEach(u=>upgLvs[u.id]=0);
  CFG.coopUpgrades.forEach(u=>coopUpgLvs[u.id]=0);
}

function initSurvival(){
  players=[
    createPlayer({r:16,speed:280,hp:100,dmg:15,atkInt:.55,proj:1,projSpd:600,pierce:0,regen:1,magnet:80,armor:1},W/3,H/2,null),
    createPlayer({r:16,speed:280,hp:100,dmg:15,atkInt:.55,proj:1,projSpd:600,pierce:0,regen:1,magnet:80,armor:1},W*2/3,H/2,null)
  ];
  upgLvs={};coopUpgLvs={};
  players.forEach((_,i)=>{upgLvs[i]={};CFG.upgrades.forEach(u=>upgLvs[i][u.id]=0);});
  CFG.coopUpgrades.forEach(u=>coopUpgLvs[u.id]=0);
}

function initCooperative(roleArr){

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gameState!=='playing'||paused)return;
  for(const t of e.changedTouches){
    // find free touch slot
    let slot=-1;
    for(let i=0;i<2;i++){if(!touches[i].active){slot=i;break;}}
    if(slot===-1)break;
    // assign to side
    const side=t.clientX<window.innerWidth*.5?0:1;
    // if that side already has a touch, use the free slot
    let useSlot=slot;
    if(!touches[side].active)useSlot=side;
    if(touches[useSlot].active)break;

    touches[useSlot].active=true;touches[useSlot].id=t.identifier;
    touches[useSlot].sx=t.clientX;touches[useSlot].sy=t.clientY;
    touches[useSlot].dx=0;touches[useSlot].dy=0;
    const sz=Math.min(120,window.innerWidth*.2);
    const ja=jAreas[useSlot];ja.style.width=sz+'px';ja.style.height=sz+'px';
    ja.style.display='block';
    ja.style.left=(t.clientX-sz/2)+'px';ja.style.top=(t.clientY-sz/2)+'px';
    const knob=ja.querySelector('.jKnob');
    if(knob)knob.style.transform='translate(-50%,-50%)';
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    for(let i=0;i<2;i++){
      if(touches[i].active&&t.identifier===touches[i].id){
        const ja=jAreas[i];const maxR=ja.offsetWidth*.35;
        let dx=t.clientX-touches[i].sx,dy=t.clientY-touches[i].sy;
        const d=Math.hypot(dx,dy);
        if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR;}
        touches[i].dx=d>3?dx/maxR:0;touches[i].dy=d>3?dy/maxR:0;
        const knob=ja.querySelector('.jKnob');
        if(knob)knob.style.transform=`translate(${-50+dx/maxR*45}%,${-50+dy/maxR*45}%)`;
        break;
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{

// ============================================================
//  PLAYER INPUT DIR
// ============================================================
function getInputDir(idx){
  let mx=0,my=0;
  if(idx===0){
    if(keys['w']||keys['arrowup']&&!players[1])my=-1;
    if(keys['s']||keys['arrowdown']&&!players[1])my=1;
    if(keys['a']||keys['arrowleft']&&!players[1])mx=-1;
    if(keys['d']||keys['arrowright']&&!players[1])mx=1;
    if(gameMode==='single'){if(keys['arrowup'])my=-1;if(keys['arrowdown'])my=1;if(keys['arrowleft'])mx=-1;if(keys['arrowright'])mx=1;}
  }else{
    if(keys['arrowup'])my=-1;if(keys['arrowdown'])my=1;
    if(keys['arrowleft'])mx=-1;if(keys['arrowright'])mx=1;
  }
  if(touches[idx]&&touches[idx].active){mx+=touches[idx].dx;my+=touches[idx].dy;}
  const mag=Math.hypot(mx,my);
  if(mag>0){mx/=mag;my/=mag;}
  return{mx,my,mag};
}

function useSkill(idx){
  const pl=players[idx];
  if(!pl||pl.downed||pl.skillCD>0)return;
  if(pl.role==='ice'){
    // 冰墙屏障 - spawn ice wall in front
    const dir=getInputDir(idx);
    let ax=1,ay=0;
    if(dir.mag>.1){ax=dir.mx;ay=dir.my;}
    const wx=pl.x+ax*60,wy=pl.y+ay*60;
    iceWalls.push({x:wx,y:wy,w:70,h:16,life:6,maxLife:6,hp:300,maxHp:300,angle:Math.atan2(ay,ax),owner:pl});
    pl.skillCD=pl.skillMaxCD;
    spawnParticles(wx,wy,'#3498db',15,80);
    SND.ice();
    showSkillMsg(idx,'冰墙屏障!');
  }else if(pl.role==='fire'){
    // 烈焰爆发 - 360 fire ring
    const n=16;
    for(let i=0;i<n;i++){
      const a=Math.PI*2/n*i;
      projs.push({x:pl.x,y:pl.y,vx:Math.cos(a)*450,vy:Math.sin(a)*450,dmg:pl.dmg*1.5,pierce:2,hit:new Set(),r:5,life:.5,isFire:true});
    }
    pl.skillCD=pl.skillMaxCD;
    spawnParticles(pl.x,pl.y,'#e74c3c',20,150);
    SND.fire();
    showSkillMsg(idx,'烈焰爆发!');

    // check ice wall detonation
    for(let i=iceWalls.length-1;i>=0;i--){
      const w=iceWalls[i];
      if(dist(pl,w)<100){
        spawnParticles(w.x,w.y,'#fff',25,200);
        SND.steam();
        // steam explosion damage to nearby enemies
        for(const e of enemies){
          if(dist(w,e)<150){e.hp-=pl.dmg*1.5*1.5;e.flash=.1;if(e.slowTimer>0){e.burnTimer=3;e.burnDps=pl.dmg*.3;}}
        }
        showSkillMsg(idx,'蒸汽爆炸!!');
        iceWalls.splice(i,1);
      }
    }
  }
}

function shoot(pl,target){
  const a=ang(pl,target),cnt=pl.proj;
  const spread=cnt>1?.1:0,off=cnt>1?(cnt-1)*spread/2:0;
  for(let i=0;i<cnt;i++){
    const aa=a-off+i*spread;
    projs.push({x:pl.x,y:pl.y,vx:Math.cos(aa)*pl.projSpd,vy:Math.sin(aa)*pl.projSpd,
      dmg:pl.dmg,pierce:pl.pierce,hit:new Set(),r:4,life:1.8,isIce:pl.role==='ice',isFire:pl.role==='fire',owner:pl});
  }
  SND.shoot();
}
function spawnGem(x,y,amt){
  const a=rand(0,Math.PI*2),d=rand(15,40);
  gems.push({x:x+Math.cos(a)*d,y:y+Math.sin(a)*d,amt,r:5+Math.min(amt,25)*.3,bob:rand(0,Math.PI*2)});
}
function spawnParticles(x,y,color,n,spd){
  for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),s=rand(spd*.3,spd);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.2,.45),maxL:rand(.2,.45),r:rand(1.5,3.5),color});}
}
function floatText(x,y,text,color){floatT.push({x,y,text,color,life:.7,maxL:.7,vy:-50});}

// shape helpers
function drawCircle(cx,cy,r){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);}
function drawDiamond(cx,cy,r){ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r,cy);ctx.closePath();}
function drawSquare(cx,cy,r){ctx.beginPath();ctx.rect(cx-r,cy-r,r*2,r*2);}
function drawTriangle(cx,cy,r,a){ctx.beginPath();for(let i=0;i<3;i++){const aa=a-Math.PI/2+i*Math.PI*2/3;const px=cx+Math.cos(aa)*r,py=cy+Math.sin(aa)*r;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();}
function drawStar(cx,cy,r,ir,a){ctx.beginPath();for(let i=0;i<10;i++){const aa=a-Math.PI/2+i*Math.PI/5;const rr=i%2===0?r:ir;const px=cx+Math.cos(aa)*rr,py=cy+Math.sin(aa)*rr;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();}
function drawHexagon(cx,cy,r,a){ctx.beginPath();for(let i=0;i<6;i++){const aa=a+i*Math.PI/3;const px=cx+Math.cos(aa)*r,py=cy+Math.sin(aa)*r;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();}
function drawEntity(cx,cy,r,color,type,flash,extra){
  ctx.save();
  // shadow
  const isBoss=type==='boss';
  if(isBoss){ctx.shadowColor=color;ctx.shadowBlur=15+Math.sin((extra||0)*3)*5;}
  ctx.beginPath();ctx.arc(cx+2,cy+3,r*.7,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.2)';ctx.fill();

  // body shape
  const col=flash>0?'#fff':color;
  ctx.fillStyle=col;ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1.5;
  const a=(extra||0); // rotation angle or gameTime
  switch(type){
    case'normal':drawCircle(cx,cy,r);break;
    case'fast':drawDiamond(cx,cy,r);break;
    case'tank':drawSquare(cx,cy,r);break;
    case'boss':drawStar(cx,cy,r,r*.5,a);break;
    case'ice':drawHexagon(cx,cy,r,a);break;
    case'fire':drawTriangle(cx,cy,r,a);break;
    case'single':drawCircle(cx,cy,r);break;
    default:drawCircle(cx,cy,r);
  }
  ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.restore();
}
// projectile shape
function drawProjShape(x,y,r,isFire,isIce){
  ctx.save();
  if(isFire)drawTriangle(x,y,r,Math.atan2(1,0));
  else if(isIce)drawDiamond(x,y,r);
  else drawCircle(x,y,r);
  ctx.restore();
}

// ============================================================
//  NEAREST ENEMY
// ============================================================
function nearestEnemy(pl){
  let best=null,bd=Infinity;
  for(const e of enemies){const d=dist(pl,e);if(d<bd){bd=d;best=e;}}
  return best;
}

// ============================================================
//  CHECK WALL COLLISION
// ============================================================
function wallBlocks(w,ex,ey,er){
  const cos=Math.cos(-w.angle),sin=Math.sin(-w.angle);
  const rx=(ex-w.x)*cos-(ey-w.y)*sin;
  const ry=(ex-w.x)*sin+(ey-w.y)*cos;
  const hw=w.w/2,hh=w.h/2;
  const cx=clamp(rx,-hw,hw),cy=clamp(ry,-hh,hh);
  const dx=rx-cx,dy=ry-cy;
  return Math.hypot(dx,dy)<er;
}

// ============================================================
//  UPDATE
// ============================================================
function update(dt){
  if(gameState!=='playing'||upgrading)return;
  gameTime+=dt;

  // skill indicators
  for(let i=0;i<2;i++){if(skillIndTimers[i]>0){skillIndTimers[i]-=dt;if(skillIndTimers[i]<=0)skillInd.style.display='none';}}

  // ----- players -----
  for(let i=0;i<players.length;i++){
    const pl=players[i];
    if(pl.downed)continue;
    // movement
    const dir=getInputDir(i);
    if(dir.mag>0){pl.x+=dir.mx*pl.speed*dt;pl.y+=dir.my*pl.speed*dt;}
    pl.x=clamp(pl.x,pl.r,W-pl.r);pl.y=clamp(pl.y,pl.r,H-pl.r);
    if(pl.inv>0)pl.inv-=dt;
    if(pl.hp<pl.maxHp)pl.hp=Math.min(pl.maxHp,pl.hp+pl.regen*dt);
    // skill CD
    if(pl.skillCD>0)pl.skillCD-=dt;
    // passive
    if(pl.role==='ice'&&pl.shieldCDTimer>0){pl.shieldCDTimer-=dt;if(pl.shieldCDTimer<=0){pl.shield=Math.round(pl.maxHp*.2);pl.shieldMax=pl.shield;pl.shieldCDTimer=8;}}
    if(pl.role==='fire'&&pl.passiveStacks>0){pl.passiveTimer-=dt;if(pl.passiveTimer<=0){pl.passiveStacks=0;}}
    // auto attack
    pl.cd-=dt;
    if(pl.cd<=0){
      // Check if behind ice wall (for fire shooter)
      let canShoot=true;
      if(pl.role==='fire'){
        let behindWall=false;
        for(const w of iceWalls){if(dist(pl,w)<w.w){behindWall=true;break;}}
        // behind wall doesn't prevent shooting but reduces incoming damage
      }
      const t=nearestEnemy(pl);
      if(t&&dist(pl,t)<700){shoot(pl,t);pl.cd=pl.atkInt;}
      else pl.cd=.1;
    }
  }

  // ----- projectiles -----
  for(let i=projs.length-1;i>=0;i--){
    const b=projs[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<-150||b.x>W+150||b.y<-150||b.y>H+150){projs.splice(i,1);continue;}
    let removed=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(b.hit.has(e))continue;
      if(dist(b,e)<b.r+e.r){
        b.hit.add(e);
        let dmg=b.dmg*(1+rand(0,.1));
        // elemental effects
        if(b.isIce){e.slowTimer=2;}
        if(b.isFire&&e.slowTimer>0){e.burnTimer=3;e.burnDps=b.dmg*.3;dmg*=1.5;floatText(e.x,e.y-15,'🔥燃烧','#f39c12');}
        e.hp-=dmg;e.flash=.07;
        spawnParticles(e.x,e.y,'#fff',3,50);
        SND.hit();

        if(e.hp<=0){
          kills++;
          if(b.owner&&b.owner.role==='fire'&&b.owner.passiveStacks<5){b.owner.passiveStacks++;b.owner.passiveTimer=3;b.owner.atkInt=Math.max(.15,b.owner.atkInt-.05*b.owner.passiveStacks);}
          spawnParticles(e.x,e.y,e.color,10,100);
          const xpAmt=e.xp*(1+(gameMode==='cooperative'?sharedLv:players[0].hp>0?1:.02));
          spawnGem(e.x,e.y,xpAmt);
          floatText(e.x,e.y-10,'+'+Math.floor(xpAmt)+'XP','#2ecc71');
          enemies.splice(j,1);
        }
        if(b.pierce<=0){projs.splice(i,1);removed=true;break;}
        b.pierce--;
      }
    }
    if(removed)continue;
  }

  // ----- enemies -----
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.slowTimer>0){e.slowTimer-=dt;}
    if(e.burnTimer>0){e.burnTimer-=dt;e.hp-=e.burnDps*dt;e.flash=.05;if(e.hp<=0){e.hp=0;spawnParticles(e.x,e.y,'#f39c12',8,80);kills++;
      const xpAmt=e.xp*(1+gameTime*.008);spawnGem(e.x,e.y,xpAmt);enemies.splice(i,1);continue;}}
    if(e.flash>0)e.flash-=dt;

    // move toward nearest player
    const spd=e.slowTimer>0?e.speed*.7:e.speed;
    let target=players[0];
    if(players.length>1){
      // target nearest non-downed player
      let td=Infinity;
      for(const pl of players){
        if(pl.downed)continue;
        const d=dist(e,pl);
        if(d<td){td=d;target=pl;}
      }
      if(!target||target.downed)target=players[0];
    }
    const a=ang(e,target);
    // check ice wall blocking
    let blocked=false;
    for(const w of iceWalls){
      if(wallBlocks(w,e.x+Math.cos(a)*spd*dt,e.y+Math.sin(a)*spd*dt,e.r)){blocked=true;w.hp-=e.dmg*dt*.1;break;}
    }
    if(!blocked){e.x+=Math.cos(a)*spd*dt;e.y+=Math.sin(a)*spd*dt;}

    // damage players
    for(const pl of players){
      if(pl.downed)continue;
      if(dist(e,pl)<e.r+pl.r){
        if(pl.inv<=0){
          let dmg=e.dmg*.5/pl.armor;
          // behind wall protection
          if(pl.role==='fire'){for(const w of iceWalls){if(dist(pl,w)<w.w+30){dmg*=.5;break;}}}
          if(pl.shield>0){const ab=Math.min(dmg,pl.shield);pl.shield-=ab;dmg-=ab;}
          pl.hp-=dmg;pl.inv=.3;
          spawnParticles(pl.x,pl.y,'#e74c3c',6,60);
          if(pl.hp<=0){
            pl.hp=0;
            if(gameMode==='cooperative'){
              if(players.every(p=>p.hp<=0)){gameOver();return;}
              pl.downed=true;
              floatText(pl.x,pl.y-20,'倒地!','#e74c3c');
            }else if(gameMode==='survival'){
              if(players.every(p=>p.hp<=0)){gameOver();return;}
              pl.downed=true;
            }else{gameOver();return;}
          }
        }
        e.x-=Math.cos(a)*25;e.y-=Math.sin(a)*25;
      }
    }
    // remove far
    if(e.x<-300||e.x>W+300||e.y<-300||e.y>H+300){if(dist(e,players[0])>Math.max(W,H)*1.5)enemies.splice(i,1);}
  }

  // ----- ice walls -----
  for(let i=iceWalls.length-1;i>=0;i--){
    const w=iceWalls[i];w.life-=dt;
    if(w.life<=0||w.hp<=0){spawnParticles(w.x,w.y,'#3498db',10,60);iceWalls.splice(i,1);continue;}
    // shield nearby fire shooter
  }

  // ----- xp gems -----
  for(let i=gems.length-1;i>=0;i--){
    const g=gems[i];g.bob+=dt*3;
    // attract to nearest player
    for(const pl of players){
      if(pl.downed)continue;
      const d=dist(pl,g);
      if(d<pl.magnet+g.r){const a=ang(g,pl),pull=180*(1-d/(pl.magnet+g.r));g.x+=Math.cos(a)*pull*dt;g.y+=Math.sin(a)*pull*dt;}
      if(d<pl.r+g.r){
        const xpGain=g.amt*(gameMode==='cooperative'?0.67:1);
        if(gameMode==='cooperative'){
          sharedXp+=xpGain;
          spawnParticles(g.x,g.y,'#2ecc71',4,40);SND.xp();gems.splice(i,1);
          while(sharedXp>=sharedXpTo){sharedXp-=sharedXpTo;sharedLv++;sharedXpTo=Math.floor(12*Math.pow(1.22,sharedLv-1));showUpgradeCoop();SND.lvlUp();}
        }else if(gameMode==='survival'){
          // each player has own xp
          if(!pl.xp){pl.xp=0;pl.xpTo=12;pl.lv=1;}
          pl.xp+=xpGain;
          spawnParticles(g.x,g.y,'#2ecc71',4,40);SND.xp();gems.splice(i,1);
          while(pl.xp>=pl.xpTo){pl.xp-=pl.xpTo;pl.lv++;pl.xpTo=Math.floor(12*Math.pow(1.22,pl.lv-1));showUpgradeSurvival(pl);SND.lvlUp();}
        }else{
          if(!pl.xp){pl.xp=0;pl.xpTo=12;pl.lv=1;}
          pl.xp+=xpGain;spawnParticles(g.x,g.y,'#2ecc71',4,40);SND.xp();gems.splice(i,1);
          while(pl.xp>=pl.xpTo){pl.xp-=pl.xpTo;pl.lv++;pl.xpTo=Math.floor(12*Math.pow(1.22,pl.lv-1));showUpgradeSingle();SND.lvlUp();}
        }
        break;
      }
    }
    if(g.x<-100||g.x>W+100||g.y<-100||g.y>H+100)gems.splice(i,1);
  }

  // ----- rescue -----
  if(gameMode==='cooperative'){
    for(let i=0;i<players.length;i++){
      const pl=players[i];
      if(!pl.downed)continue;
      const other=players[1-i];
      if(other.downed)continue;
      if(dist(pl,other)<80){
        reviveProgress+=dt;
        if(reviveProgress>=3){
          pl.downed=false;pl.hp=pl.maxHp*.5;
          reviveProgress=0;reviveTarget=null;
          floatText(pl.x,pl.y-20,'已复活!','#2ecc71');
          spawnParticles(pl.x,pl.y,'#2ecc71',15,100);
        }
        if(reviveTarget!==i){reviveTarget=i;reviveProgress=0;}
      }else{reviveProgress=Math.max(0,reviveProgress-dt*2);}
    }
    if(players.every(p=>p.downed)){gameOver();return;}
  }
  if(gameMode==='survival'&&players.every(p=>p.downed||p.hp<=0)){gameOver();return;}

  // ----- particles -----
  for(let i=parts.length-1;i>=0;i--){const pt=parts[i];pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.life-=dt;pt.vx*=.96;pt.vy*=.96;if(pt.life<=0)parts.splice(i,1);}
  // ----- floating text -----
  for(let i=floatT.length-1;i>=0;i--){const t=floatT[i];t.y+=t.vy*dt;t.life-=dt;if(t.life<=0)floatT.splice(i,1);}

  // ----- spawning -----
  spawnTimer-=dt;
  if(spawnTimer<=0){
    const w=getWave();
    const mult=gameMode==='single'?1:1.5;
    spawnTimer=Math.max(.25,w.si-gameTime*.0015);
    const n=Math.round((w.n+Math.floor(gameTime/40))*mult);
    for(let i=0;i<n;i++)spawnEnemy();
    for(let i=0;i<CFG.waves.length;i++){
      if(Math.abs(gameTime-CFG.waves[i].t)<.5&&CFG.waves[i].t>0&&!waveShown[i]){
        waveShown[i]=true;showBanner('第'+(i+1)+'波');
      }
    }
  }
  updateUI();
}

let levelingPlayerIdx=-1; // which player is choosing upgrades (survival mode)

function showUpgradeSingle(){
  levelingPlayerIdx=-1;
  const avail=CFG.upgrades.filter(u=>(upgLvs[u.id]||0)<5);
  const ch=[...avail].sort(()=>Math.random()-.5).slice(0,3);
  showUpgradePanelFn(ch);
  upgradeSub.textContent='选择一个强化';
}
function showUpgradeSurvival(pl){
  const idx=players.indexOf(pl);
  levelingPlayerIdx=idx;
  const avail=CFG.upgrades.filter(u=>(upgLvs[idx][u.id]||0)<5);
  const ch=[...avail].sort(()=>Math.random()-.5).slice(0,3);
  // tag with target so applyUpg knows which player
  const tagged=ch.map(u=>({...u,target:idx}));
  showUpgradePanelFn(tagged);
  upgradeSub.textContent='P'+(idx+1)+' 选择一个强化';
}
function showUpgradeCoop(){
  // 2 personal (1 per role) + 1 coop
  const p1Upgs=CFG.upgrades.filter(u=>(upgLvs[0][u.id]||0)<5);
  const p2Upgs=CFG.upgrades.filter(u=>(upgLvs[1][u.id]||0)<5);
  const cUpgs=CFG.coopUpgrades.filter(u=>(coopUpgLvs[u.id]||0)<4);
  const p1ch=p1Upgs[Math.floor(Math.random()*p1Upgs.length)]||CFG.upgrades[0];
  const p2ch=p2Upgs[Math.floor(Math.random()*p2Upgs.length)]||CFG.upgrades[0];
  const cch=cUpgs[Math.floor(Math.random()*cUpgs.length)]||CFG.coopUpgrades[0];
  const ch=[{...p1ch,isPersonal:true,target:0},{...p2ch,isPersonal:true,target:1},{...cch,isCoop:true}];
  showUpgradePanelFn(ch);
  upgradeSub.textContent='选择强化 (个人/合作)';
}

function showUpgradePanelFn(ch){
  upgradeChoices.innerHTML='';
  ch.forEach(c=>{
    let valStr='';const u=c;
    if(u.isCoop){
      switch(u.id){case 'coopDmg':valStr='双方伤害+'+u.perLv;break;case 'coopHp':valStr='双方生命+'+u.perLv;break;case 'coopSpd':valStr='双方移速+'+u.perLv;break;case 'coopRegen':valStr='双方回复+'+u.perLv+'/s';break;}
    }else{
      switch(u.id){case 'damage':valStr='+'+u.perLv+' 伤害';break;case 'attSpd':valStr='间隔-'+u.perLv.toFixed(2)+'s';break;case 'mSpd':valStr='+'+u.perLv+' 移速';break;case 'multi':valStr='+'+u.perLv+' 子弹';break;case 'pierce':valStr='+'+u.perLv+' 穿透';break;case 'pSpd':valStr='+'+u.perLv+' 弹速';break;case 'hpUp':valStr='+'+u.perLv+' 生命';break;case 'regen':valStr='+'+u.perLv+'/s 回复';break;case 'magnet':valStr='+'+u.perLv+' 范围';break;}
    }
    const card=dl.createElement('div');
    card.className='ucard'+(u.isCoop?' coop':'');
    let prefix='';if(u.isCoop)prefix='🤝 ';else if(u.target!==undefined){const re=players[u.target].role==='ice'?'🧊':'🔥';prefix=(u.target===0?'P1 ':'P2 ')+re+' ';}
    card.innerHTML=`<div class="icon">${u.icon}</div><div class="name">${prefix}${u.name}</div><div class="desc">${u.desc||''}</div><div class="val">${valStr}</div>`;
    card.addEventListener('click',()=>applyUpg(c,u));
    card.addEventListener('touchend',e=>{e.preventDefault();applyUpg(c,u);});
    upgradeChoices.appendChild(card);
  });
  upgrading=true;
  upgradePanel.style.display='flex';
}

function applyUpg(cardData){
  const cd=cardData;
  if(cd.isCoop){
    coopUpgLvs[cd.id]=(coopUpgLvs[cd.id]||0)+1;
    switch(cd.id){case'coopDmg':players.forEach(p=>p.dmg+=cd.perLv);break;case'coopHp':players.forEach(p=>{p.maxHp+=cd.perLv;p.hp+=cd.perLv;});break;case'coopSpd':players.forEach(p=>p.speed+=cd.perLv);break;case'coopRegen':players.forEach(p=>p.regen+=cd.perLv);break;}
  }else if(cd.target!==undefined){
    const pl=players[cd.target];
    const key=cd.isPersonal?cd.target:cd.target;
    if(cd.isPersonal){upgLvs[cd.target][cd.id]=(upgLvs[cd.target][cd.id]||0)+1;}
    else{upgLvs[cd.target][cd.id]=(upgLvs[cd.target][cd.id]||0)+1;}
    switch(cd.id){case'damage':pl.dmg+=cd.perLv;break;case'attSpd':pl.atkInt=Math.max(.12,pl.atkInt-cd.perLv);break;case'mSpd':pl.speed+=cd.perLv;break;case'multi':pl.proj+=cd.perLv;break;case'pierce':pl.pierce+=cd.perLv;break;case'pSpd':pl.projSpd+=cd.perLv;break;case'hpUp':pl.maxHp+=cd.perLv;pl.hp+=cd.perLv;break;case'regen':pl.regen+=cd.perLv;break;case'magnet':pl.magnet+=cd.perLv;break;}
  }else{
    const pl=players[0];
    upgLvs[cd.id]=(upgLvs[cd.id]||0)+1;
    switch(cd.id){case'damage':pl.dmg+=cd.perLv;break;case'attSpd':pl.atkInt=Math.max(.12,pl.atkInt-cd.perLv);break;case'mSpd':pl.speed+=cd.perLv;break;case'multi':pl.proj+=cd.perLv;break;case'pierce':pl.pierce+=cd.perLv;break;case'pSpd':pl.projSpd+=cd.perLv;break;case'hpUp':pl.maxHp+=cd.perLv;pl.hp+=cd.perLv;break;case'regen':pl.regen+=cd.perLv;break;case'magnet':pl.magnet+=cd.perLv;break;}
  }
  upgrading=false;
  upgradePanel.style.display='none';
}

// ============================================================
//  RENDER
// ============================================================
function render(){
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
  const gs=40;
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  const ox=-((players[0]?.x||0)%gs),oy=-((players[0]?.y||0)%gs);
  ctx.beginPath();
  for(let x=ox;x<W;x+=gs){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(let y=oy;y<H;y+=gs){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();

  if(gameState!=='playing'&&gameState!=='paused')return;

  // ice walls
  for(const w of iceWalls){
    ctx.save();ctx.translate(w.x,w.y);ctx.rotate(w.angle);
    const grd=ctx.createLinearGradient(-w.w/2,0,w.w/2,0);
    grd.addColorStop(0,'rgba(52,152,219,.2)');grd.addColorStop(.5,'rgba(52,152,219,.5)');grd.addColorStop(1,'rgba(52,152,219,.2)');
    ctx.fillStyle=grd;ctx.fillRect(-w.w/2,-w.h/2,w.w,w.h);
    ctx.strokeStyle='rgba(52,152,219,.6)';ctx.lineWidth=2;ctx.strokeRect(-w.w/2,-w.h/2,w.w,w.h);
    ctx.restore();
  }

  // gems
  for(const g of gems){const by=Math.sin(g.bob)*2.5;ctx.beginPath();ctx.arc(g.x,g.y+by,g.r,0,Math.PI*2);const grd=ctx.createRadialGradient(g.x,g.y+by,0,g.x,g.y+by,g.r);grd.addColorStop(0,'#2ecc71');grd.addColorStop(1,'rgba(39,174,96,0)');ctx.fillStyle=grd;ctx.fill();ctx.beginPath();ctx.arc(g.x,g.y+by,g.r*.35,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();}

  // soul chain (cooperative)
  if(gameMode==='cooperative'&&players.length>=2&&!players[0].downed&&!players[1].downed){
    ctx.beginPath();ctx.moveTo(players[0].x,players[0].y);ctx.lineTo(players[1].x,players[1].y);
    ctx.strokeStyle=`rgba(52,152,219,${.3+Math.sin(gameTime*2)*.1})`;ctx.lineWidth=2;ctx.setLineDash([8,12]);ctx.stroke();ctx.setLineDash([]);
  }

  // enemies
  for(const e of enemies){
    let col=e.flash>0?'#fff':e.color;
    if(e.burnTimer>0)col='#f39c12';
    const drawType=e.type==='boss'?'boss':e.type==='fast'?'fast':e.type==='tank'?'tank':'normal';
    drawEntity(e.x,e.y,e.r,col,drawType,e.flash,gameTime);
    // boss orbital particles
    if(e.type==='boss'){
      const orbR=e.r+10;
      for(let o=0;o<3;o++){
        const oa=gameTime*2.5+o*Math.PI*2/3;
        const ox=e.x+Math.cos(oa)*orbR,oy=e.y+Math.sin(oa)*orbR;
        ctx.beginPath();ctx.arc(ox,oy,3,0,Math.PI*2);
        ctx.fillStyle=`rgba(241,196,15,${.5+Math.sin(gameTime*4+o)*.3})`;ctx.fill();
      }
    }
    // status rings
    if(e.slowTimer>0){ctx.beginPath();ctx.arc(e.x,e.y,e.r+2,0,Math.PI*2);ctx.strokeStyle='rgba(52,152,219,.4)';ctx.lineWidth=2;ctx.stroke();}
    if(e.burnTimer>0){ctx.beginPath();ctx.arc(e.x,e.y,e.r+1,0,Math.PI*2);ctx.strokeStyle='rgba(243,156,18,.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
    if(e.hp<e.maxHp){const bw=e.r*1.8,bh=3,bx=e.x-bw/2,by=e.y-e.r-8;ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);ctx.fillStyle=e.hp/e.maxHp>.5?'#2ecc71':e.hp/e.maxHp>.25?'#f39c12':'#e74c3c';ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);}
  }

  // projectiles
  for(const b of projs){
    ctx.save();
    // trail
    for(let i=3;i>0;i--){const a=i/3*.2;const px=b.x-b.vx*.012*i,py=b.y-b.vy*.012*i;drawProjShape(px,py,b.r*i/3*.5,b.isFire,b.isIce);ctx.fillStyle=`rgba(${b.isFire?'231,76,60':b.isIce?'52,152,219':'241,196,15'},${a})`;ctx.fill();}
    // core
    drawProjShape(b.x,b.y,b.r,b.isFire,b.isIce);
    const grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    if(b.isFire){grd.addColorStop(0,'#fff');grd.addColorStop(.4,'#e74c3c');grd.addColorStop(1,'#c0392b');}
    else if(b.isIce){grd.addColorStop(0,'#fff');grd.addColorStop(.4,'#3498db');grd.addColorStop(1,'#2980b9');}
    else{grd.addColorStop(0,'#fff');grd.addColorStop(.4,'#f1c40f');grd.addColorStop(1,'#e67e22');}
    ctx.fillStyle=grd;ctx.fill();
    ctx.restore();
  }

  // players
  for(const pl of players){
    ctx.save();
    const roleCol=pl.role==='ice'?'#3498db':pl.role==='fire'?'#e74c3c':'#5dade2';
    const c1=pl.role==='ice'?'#74b9ff':pl.role==='fire'?'#ff7675':'#5dade2';
    const c2=pl.role==='ice'?'#0984e3':pl.role==='fire'?'#d63031':'#2e86c1';
    const c3=pl.role==='ice'?'#0652a0':pl.role==='fire'?'#8b0000':'#1a5276';
    const drawType=pl.role==='ice'?'ice':pl.role==='fire'?'fire':'single';
    // get movement direction for rotation
    const dir=getInputDir(players.indexOf(pl));
    let faceA=0; if(dir.mag>.1)faceA=Math.atan2(dir.my,dir.mx)+Math.PI/2;
    drawEntity(pl.x,pl.y,pl.r,roleCol,drawType,0,faceA);
    // gradient overlay
    const grd=ctx.createRadialGradient(pl.x-3,pl.y-3,0,pl.x,pl.y,pl.r);
    grd.addColorStop(0,c1);grd.addColorStop(.6,c2);grd.addColorStop(1,c3);
    ctx.globalAlpha=.35;
    ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    ctx.globalAlpha=1;
    // highlight
    ctx.beginPath();ctx.arc(pl.x-3,pl.y-3,pl.r*.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fill();
    // role indicator
    if(pl.role==='ice'){ctx.font='12px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('❄',pl.x,pl.y-pl.r-6);}
    if(pl.role==='fire'){ctx.font='12px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('🔥',pl.x,pl.y-pl.r-6);}
    // shield bar
    if(pl.shield>0){ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r+2,0,Math.PI*2*(pl.shield/pl.shieldMax));ctx.strokeStyle='rgba(52,152,219,.6)';ctx.lineWidth=3;ctx.stroke();}
    // inv flash
    if(pl.inv>0&&Math.floor(pl.inv*20)%2===0){ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r+3,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.stroke();}
    // downed indicator
    if(pl.downed){ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r+6,0,Math.PI*2);ctx.strokeStyle='rgba(231,76,60,.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(231,76,60,.3)';ctx.fill();}
    // revive progress
    if(reviveTarget!==null&&reviveProgress>0&&players.some(p=>p===pl&&p.downed)){
      const bw=pl.r*2,bx=pl.x-bw/2,by=pl.y-pl.r-10;ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx,by,bw,4);ctx.fillStyle='#2ecc71';ctx.fillRect(bx,by,bw*(reviveProgress/3),4);
    }
    ctx.restore();
  }

  // particles
  for(const pt of parts){const a=pt.life/pt.maxL;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*a,0,Math.PI*2);ctx.fillStyle=pt.color;ctx.fill();}
  ctx.globalAlpha=1;

  // floating text
  for(const t of floatT){const a=t.life/t.maxL;ctx.globalAlpha=a;ctx.fillStyle=t.color;ctx.font='bold 13px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=2;ctx.fillText(t.text,t.x,t.y);ctx.shadowBlur=0;}
  ctx.globalAlpha=1;

  // skill cooldown indicators
  if(gameMode==='cooperative'||gameMode==='survival'){
    for(let i=0;i<players.length;i++){
      const pl=players[i];
      if(pl.skillMaxCD>0){
        const cd=pl.skillCD/pl.skillMaxCD;
        const sx=pl.x-15, sy=pl.y+pl.r+6;
        ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(sx,sy,30,4);
        ctx.fillStyle=cd<=0?'#2ecc71':'#f39c12';ctx.fillRect(sx,sy,30*(1-cd),4);
        if(cd<=0){ctx.fillStyle='#f1c40f';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(pl.skillKey==='e'?'[E]':'[回车]',pl.x,pl.y+pl.r+16);}
      }
    }
  }
}

// ============================================================
//  GAME OVER
// ============================================================
function gameOver(){
  gameState='gameover';
  SND.over();
  const m=Math.floor(gameTime/60),s=Math.floor(gameTime%60);
  const tStr=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if(players.length>=2){
    goStats.innerHTML=`生存: <span>${tStr}</span><br>击杀: <span>${kills}</span><br>P1 ${players[0].role==='ice'?'🧊':'🔥'} 生命: <span>${Math.ceil(players[0].hp)}/${players[0].maxHp}</span><br>P2 ${players[1].role==='ice'?'🧊':'🔥'} 生命: <span>${Math.ceil(players[1].hp)}/${players[1].maxHp}</span>`;
  }else{
    goStats.innerHTML=`生存: <span>${tStr}</span><br>击杀: <span>${kills}</span><br>状态: <span>${players[0]?.downed?'倒地':'阵亡'}</span>`;
  }
  gameOverScreen.style.display='flex';
  pauseBtn.style.display='none';
  ui.style.display='none';
}

// ============================================================
//  STATE MACHINE
// ============================================================
function enterMenu(){
  gameState='menu';gameMode=null;roles=[];
  players=[];enemies=[];projs=[];gems=[];parts=[];floatT=[];iceWalls=[];
  gameTime=0;sharedLv=1;sharedXp=0;sharedXpTo=12;kills=0;
  spawnTimer=0;bossSpawned=false;
  reviveTarget=null;reviveProgress=0;
  startScreen.style.display='flex';pauseBtn.style.display='none';ui.style.display='none';
  gameOverScreen.style.display='none';upgradePanel.style.display='none';pauseScreen.style.display='none';
  modeScreen.style.display='none';roleScreen.style.display='none';howScreen.style.display='none';
  coopInfo.style.display='none';skillInd.style.display='none';playerTag.style.display='none';
  jA1.style.display='none';jA2.style.display='none';
  for(let i=0;i<2;i++){touches[i].active=false;touches[i].id=-1;touches[i].dx=0;touches[i].dy=0;}
}

function enterModeSelect(){
  startScreen.style.display='none';modeScreen.style.display='flex';
  howScreen.style.display='none';
}

function enterRoleSelect(){
  modeScreen.style.display='none';roleScreen.style.display='flex';
}

function enterPlaying(){
  gameState='playing';
  startScreen.style.display='none';modeScreen.style.display='none';roleScreen.style.display='none';
  gameOverScreen.style.display='none';upgradePanel.style.display='none';pauseScreen.style.display='none';
  pauseBtn.style.display='flex';ui.style.display='flex';
  playerTag.style.display=gameMode==='single'?'none':'flex';
  jA1.style.display='none';jA2.style.display='none';

  initGame();
  if(gameMode==='single')initSingle();
  else if(gameMode==='survival')initSurvival();
  else if(gameMode==='cooperative')initCooperative(roles);

  resize();
  spawnTimer=.5;
  lastT=0;
}

function togglePause(){
  if(gameState==='playing'){
    gameState='paused';
    pauseScreen.style.display='flex';
    pauseBtn.textContent='▶';
  }else if(gameState==='paused'){
    gameState='playing';
    pauseScreen.style.display='none';
    pauseBtn.textContent='⏸';
    lastT=0;
  }
}

function enterGameOver(){
  gameOver();
}

// ============================================================
//  EVENT BINDINGS
// ============================================================
function bind(el,fn){el.addEventListener('click',fn);el.addEventListener('touchend',e=>{e.preventDefault();fn();});}
const COOLDOWN=350;
let lastClick=0;
function debounce(fn){
  return function(){
    const now=Date.now();
    if(now-lastClick<COOLDOWN)return;
    lastClick=now;
    fn();
  };
}

// Start screen
bind($('btnPlay'),debounce(enterModeSelect));
bind($('btnHow'),debounce(()=>{startScreen.style.display='none';howScreen.style.display='flex';}));
bind($('btnHowBack'),debounce(()=>{howScreen.style.display='none';startScreen.style.display='flex';}));

// Mode screen
$('modeScreen').querySelectorAll('[data-mode]').forEach(b=>{
  bind(b,debounce(()=>{
    gameMode=b.dataset.mode;
    if(gameMode==='cooperative')enterRoleSelect();else{roles=[];enterPlaying();}
  }));
});
bind($('btnModeBack'),debounce(enterMenu));

// Role screen
$('roleScreen').querySelectorAll('[data-roles]').forEach(b=>{
  bind(b,debounce(()=>{
    roles=b.dataset.roles.split(',');
    enterPlaying();
  }));
});
bind($('btnRoleBack'),debounce(enterModeSelect));

// Pause
bind(pauseBtn,debounce(togglePause));
bind($('btnResume'),debounce(togglePause));
bind($('btnRestart'),debounce(()=>{gameState='menu';enterPlaying();}));
bind($('btnMenu'),debounce(enterMenu));

// Game over
bind($('btnRetry'),debounce(()=>{gameState='menu';enterPlaying();}));
bind($('btnGoMenu'),debounce(enterMenu));

// ============================================================
//  LOOP
// ============================================================
function loop(ts){
  if(!lastT)lastT=ts;
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;
  if(gameState==='playing')update(dt);
  render();
  requestAnimationFrame(loop);
}

// ============================================================
//  INIT
// ============================================================
resize();enterMenu();
lastT=0;
requestAnimationFrame(loop);
</script>
</body>
</html>
